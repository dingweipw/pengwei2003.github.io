<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三维最小二乘定位 · 自由增减信标（修复版）</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.8); color: white;
            padding: 15px 25px; border-radius: 8px;
            border-left: 4px solid #4caf50; z-index: 10;
            pointer-events: none; box-shadow: 0 2px 15px rgba(0,0,0,0.5);
        }
        #info h1 { margin: 0 0 5px; font-size: 1.4rem; color: #4caf50; }
        #info p { margin: 5px 0; }
        #est-coords { font-family: monospace; font-weight: bold; color: #ffaa00; }
        #controls {
            position: absolute; bottom: 30px; left: 20px; right: 20px;
            background: rgba(30, 30, 30, 0.95); color: white;
            padding: 20px; border-radius: 12px; backdrop-filter: blur(5px);
            border: 1px solid #444; z-index: 20; max-height: 50vh;
            overflow-y: auto; box-shadow: 0 -4px 20px rgba(0,0,0,0.7);
            pointer-events: auto;
        }
        #controls h3 { margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 8px; }
        .beacon-list {
            display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;
            max-height: 300px; overflow-y: auto; padding: 5px;
        }
        .beacon-card {
            background: #3a3a3a; border-radius: 8px; padding: 12px;
            border: 1px solid #555; width: 160px;
        }
        .beacon-card h4 {
            margin: 0 0 10px; color: #ffaa00; text-align: center;
            font-size: 1rem;
        }
        .input-group {
            display: flex; align-items: center; margin-bottom: 6px;
            gap: 5px;
        }
        .input-group label { width: 25px; color: #aaa; font-weight: bold; }
        .input-group input {
            flex: 1; padding: 5px; border-radius: 4px; border: 1px solid #666;
            background: #222; color: white; font-family: monospace;
            text-align: right;
        }
        .toolbar {
            display: flex; gap: 12px; align-items: center;
            flex-wrap: wrap; margin-top: 15px;
        }
        button {
            background: #4caf50; border: none; color: white;
            padding: 8px 22px; border-radius: 30px; font-size: 1rem;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            border: 1px solid #66bb6a;
        }
        button:hover { background: #66bb6a; }
        button.remove { background: #d32f2f; border-color: #f44336; }
        button.remove:hover { background: #f44336; }
        .estimation {
            background: #1e3a2e; padding: 8px 20px; border-radius: 30px;
            border: 1px solid #4caf50; font-size: 1.1rem;
            margin-left: auto;
        }
        .warning { color: #ffaa00; margin-top: 8px; font-size: 0.9rem; }
    </style>
    <!-- 使用传统 script 标签引入 three.js 和 math.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.7.0/math.min.js"></script>
</head>
<body>
    <div id="info">
        <h1>📡 三维最小二乘定位 · 自由增减信标</h1>
        <p>估计坐标: <span id="estX">0.000</span> , <span id="estY">0.000</span> , <span id="estZ">0.000</span></p>
        <p id="message" style="color: #aaf;">⚡ 调整参数，绿色球体实时更新</p>
    </div>

    <div id="controls">
        <h3>🔹 信标节点 (红色球体) 坐标与测量距离</h3>
        <div class="beacon-list" id="beacon-list"></div>
        <div class="toolbar">
            <button id="addBtn">➕ 添加信标</button>
            <button id="removeBtn" class="remove">➖ 移除最后一个信标</button>
            <div class="estimation">
                🟢 估计: (<span id="estX2">0.000</span>, <span id="estY2">0.000</span>, <span id="estZ2">0.000</span>)
            </div>
        </div>
        <div class="warning" id="warningMsg">* 以最后一个信标为参考，避免信标共面。</div>
    </div>

    <script>
        window.onload = function() {
            // --- 初始化场景 ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111122);

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 12, 20);
            camera.lookAt(5, 5, 5);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = false;
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(5, 5, 5);

            // 光照
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(10, 20, 5);
            scene.add(dirLight);
            const fillLight = new THREE.PointLight(0x446688, 0.5);
            fillLight.position.set(-5, 10, 15);
            scene.add(fillLight);

            // 辅助网格和轴线
            const gridHelper = new THREE.GridHelper(30, 20, 0x8888ff, 0x333344);
            gridHelper.position.y = 0;
            scene.add(gridHelper);
            const axesHelper = new THREE.AxesHelper(15);
            scene.add(axesHelper);

            // 星星背景
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 800;
            const starPositions = new Float32Array(starsCount * 3);
            for (let i = 0; i < starsCount; i++) {
                starPositions[i*3] = (Math.random() - 0.5) * 200;
                starPositions[i*3+1] = (Math.random() - 0.5) * 200;
                starPositions[i*3+2] = (Math.random() - 0.5) * 200;
            }
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starsMaterial = new THREE.PointsMaterial({color: 0x888888, size: 0.15});
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);

            // --- 数据状态 ---
            let beacons = [
                { x: 12.5, y: 8.2, z: 3.7, d: 10.24 },
                { x: 4.3, y: 15.6, z: 9.1, d: 9.87 },
                { x: 7.8, y: 1.4, z: 11.2, d: 11.52 },
                { x: 10.1, y: 13.7, z: 5.9, d: 8.95 },
                { x: 2.6, y: 6.8, z: 14.3, d: 12.31 }
            ];

            let beaconMeshes = [];

            const estSphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.7, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0x44ff44, emissive: 0x224422 })
            );
            scene.add(estSphere);

            // --- 工具函数：更新3D信标球体 ---
            function updateBeaconMeshes() {
                beaconMeshes.forEach(mesh => scene.remove(mesh));
                beaconMeshes = [];
                beacons.forEach((b) => {
                    const geom = new THREE.SphereGeometry(0.5, 32, 32);
                    const mat = new THREE.MeshStandardMaterial({ color: 0xff5555, emissive: 0x331111 });
                    const sphere = new THREE.Mesh(geom, mat);
                    sphere.position.set(b.x, b.y, b.z);
                    scene.add(sphere);
                    beaconMeshes.push(sphere);
                });
            }

            // --- 工具函数：重新生成输入框 ---
            function renderInputs() {
                const container = document.getElementById('beacon-list');
                let html = '';
                beacons.forEach((b, i) => {
                    html += `
                        <div class="beacon-card" data-index="${i}">
                            <h4>A${i+1}</h4>
                            <div class="input-group"><label>X</label><input type="number" id="x${i}" step="0.1" value="${b.x.toFixed(1)}"></div>
                            <div class="input-group"><label>Y</label><input type="number" id="y${i}" step="0.1" value="${b.y.toFixed(1)}"></div>
                            <div class="input-group"><label>Z</label><input type="number" id="z${i}" step="0.1" value="${b.z.toFixed(1)}"></div>
                            <div class="input-group"><label>d</label><input type="number" id="d${i}" step="0.01" value="${b.d.toFixed(2)}"></div>
                        </div>
                    `;
                });
                container.innerHTML = html;
                attachInputEvents();
            }

            // --- 从输入框读取数据 ---
            function readInputsToBeacons() {
                beacons.forEach((_, i) => {
                    const xInput = document.getElementById(`x${i}`);
                    const yInput = document.getElementById(`y${i}`);
                    const zInput = document.getElementById(`z${i}`);
                    const dInput = document.getElementById(`d${i}`);
                    if (xInput) beacons[i].x = parseFloat(xInput.value) || 0;
                    if (yInput) beacons[i].y = parseFloat(yInput.value) || 0;
                    if (zInput) beacons[i].z = parseFloat(zInput.value) || 0;
                    if (dInput) beacons[i].d = parseFloat(dInput.value) || 0;
                });
            }

            // --- 最小二乘计算（修复版：去掉条件数检查，直接求解，捕获异常）---
            function computeLeastSquares() {
                const n = beacons.length;
                if (n < 4) return { success: false, message: '至少需要4个信标' };

                const refIdx = n - 1;
                const ref = beacons[refIdx];

                let A = [];
                let b = [];
                for (let i = 0; i < n-1; i++) {
                    const bi = beacons[i];
                    A.push([ref.x - bi.x, ref.y - bi.y, ref.z - bi.z]);
                    const biVal = 0.5 * (
                        (ref.x*ref.x - bi.x*bi.x) +
                        (ref.y*ref.y - bi.y*bi.y) +
                        (ref.z*ref.z - bi.z*bi.z) +
                        bi.d*bi.d - ref.d*ref.d
                    );
                    b.push([biVal]);
                }

                try {
                    const A_mat = math.matrix(A);
                    const b_vec = math.matrix(b);
                    const At = math.transpose(A_mat);
                    const AtA = math.multiply(At, A_mat);
                    const Atb = math.multiply(At, b_vec);

                    // 直接求解，如果矩阵奇异，lusolve 会抛出错误
                    const X = math.lusolve(AtA, Atb);
                    const x = X.get([0,0]);
                    const y = X.get([1,0]);
                    const z = X.get([2,0]);

                    return { success: true, coords: [x, y, z] };
                } catch (e) {
                    // 如果矩阵奇异或数值问题，返回错误
                    return { success: false, message: '矩阵奇异，请调整信标位置避免共面' };
                }
            }

            // --- 更新UI和场景 ---
            function updateAll() {
                readInputsToBeacons();

                // 更新信标球体位置
                beaconMeshes.forEach((mesh, i) => {
                    if (beacons[i]) {
                        mesh.position.set(beacons[i].x, beacons[i].y, beacons[i].z);
                    }
                });

                const result = computeLeastSquares();

                const estX = document.getElementById('estX');
                const estY = document.getElementById('estY');
                const estZ = document.getElementById('estZ');
                const estX2 = document.getElementById('estX2');
                const estY2 = document.getElementById('estY2');
                const estZ2 = document.getElementById('estZ2');
                const message = document.getElementById('message');
                const warning = document.getElementById('warningMsg');

                if (result.success) {
                    const [x, y, z] = result.coords;
                    estSphere.position.set(x, y, z);
                    estX.textContent = x.toFixed(3);
                    estY.textContent = y.toFixed(3);
                    estZ.textContent = z.toFixed(3);
                    estX2.textContent = x.toFixed(3);
                    estY2.textContent = y.toFixed(3);
                    estZ2.textContent = z.toFixed(3);
                    message.innerHTML = '✅ 解算成功';
                    message.style.color = '#aaffaa';
                    warning.innerHTML = '* 当前估计位置如绿色球体所示';
                } else {
                    message.innerHTML = '⚠️ ' + result.message;
                    message.style.color = '#ff6b6b';
                    warning.innerHTML = '* 解算失败，请调整参数';
                }
            }

            // --- 绑定输入事件 ---
            function attachInputEvents() {
                const inputs = document.querySelectorAll('#beacon-list input');
                let timer;
                inputs.forEach(input => {
                    input.removeEventListener('input', inputHandler);
                    input.addEventListener('input', inputHandler);
                });
                function inputHandler() {
                    if (timer) clearTimeout(timer);
                    timer = setTimeout(() => {
                        updateAll();
                    }, 150);
                }
            }

            // --- 添加/移除信标 ---
            function addBeacon() {
                const newBeacon = {
                    x: Math.random() * 10,
                    y: Math.random() * 10,
                    z: Math.random() * 10,
                    d: 8 + Math.random() * 5
                };
                beacons.push(newBeacon);
                renderInputs();
                updateBeaconMeshes();
                updateAll();
            }

            function removeBeacon() {
                if (beacons.length <= 4) {
                    alert('至少需要保留4个信标');
                    return;
                }
                beacons.pop();
                renderInputs();
                updateBeaconMeshes();
                updateAll();
            }

            // 初始化
            renderInputs();
            updateBeaconMeshes();
            updateAll();

            document.getElementById('addBtn').addEventListener('click', addBeacon);
            document.getElementById('removeBtn').addEventListener('click', removeBeacon);

            // 动画循环
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>
</html>
